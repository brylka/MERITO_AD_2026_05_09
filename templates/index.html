<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Chatbot</title>
</head>
<body>
<h1>Chatbot</h1>
<form method="post">
    <input type="text" name="prompt">
    <button type="submit">Wyślij</button>
</form>
{% for msg in history %}
<b>{{ msg.role }}</b>: {{ msg.parts[0].text }}<br>
{% endfor %}
</body>
</html>
